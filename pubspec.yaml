name: caregiver_tool
description: Offline decompression tool for family caregivers of people with dementia.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  llamadart: ^0.6.12
  flutter_riverpod: ^2.5.1
  go_router: ^14.6.0
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.4
  url_launcher: ^6.3.0
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/prompts/
