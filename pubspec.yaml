name: caregiver_tool
description: Offline decompression tool for family caregivers of people with dementia.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  llamadart: ^0.6.12
  flutter_riverpod: ^2.5.1
  go_router: ^14.6.0
  url_launcher: ^6.3.0
  shared_preferences: ^2.3.2
  # Block 2 (download-on-first-launch). Networking uses built-in dart:io
  # (no http/dio package — CLAUDE.md Hard Rule #2). Owner-approved deps:
  path_provider: ^2.1.4 # writable app dir for the downloaded GGUF
  crypto: ^3.0.3 # streaming SHA-256 verify of the downloaded model

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/prompts/
